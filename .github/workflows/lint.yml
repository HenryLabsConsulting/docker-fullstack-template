# CI — Lint & Type Check
# Runs on every push and pull request to catch issues early.
# Customize lint rules in backend/.flake8 or frontend/tsconfig.json.

name: CI — Lint & Type Check

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8==7.1.1
      # Lint the backend code. Add --max-line-length=120 or a .flake8
      # config file to customize rules.
      - run: flake8 .

  check-typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      # Type check without emitting files — catches type errors
      # that might not surface until build time.
      - run: npx tsc --noEmit
