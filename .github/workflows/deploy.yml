# Deploy to Production
#
# Triggers on push to main. SSHs into your server, pulls latest code,
# rebuilds containers, and verifies the health endpoint.
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   DEPLOY_HOST     — your server IP or hostname (e.g., 203.0.113.50)
#   DEPLOY_USER     — SSH username (e.g., deploy)
#   DEPLOY_SSH_KEY  — private SSH key for authentication
#   DEPLOY_PATH     — absolute path to the project on the server (e.g., /opt/myapp)
#
# Setup steps:
#   1. SSH into your server and clone the repo to DEPLOY_PATH
#   2. Copy .env.example to .env and fill in production values
#   3. Run `docker compose up --build -d` once manually to verify
#   4. Add the GitHub Secrets above
#   5. Set repository variable DEPLOY_ENABLED to "true"
#      (Settings > Secrets and variables > Actions > Variables)
#   6. Push to main — this workflow handles the rest

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Skips cleanly (no failing run) until you opt in: set the DEPLOY_ENABLED
    # repository variable to "true" and add the secrets above.
    if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git pull origin main

            # Rebuild and restart containers
            docker compose build --no-cache backend frontend
            docker compose stop backend frontend
            docker compose rm -f backend frontend
            docker compose up -d backend frontend

            # Wait for backend to become healthy
            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "Backend healthy after ${i}s"
                break
              fi
              sleep 1
            done

            # Run any pending database migrations
            docker compose exec -T backend flask db upgrade 2>/dev/null || echo "No pending migrations"

            # Final health verification
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy complete and verified: $(date)"
            else
              echo "WARNING: Health check returned $HTTP_CODE after deploy"
              exit 1
            fi
