# Nginx reverse proxy — production reference config
#
# This file is NOT used during development (docker-compose dev mode).
# It's a starting point for when you deploy to a VPS with a domain name.
#
# Setup:
#   1. Install Nginx on your server
#   2. Copy this file to /etc/nginx/sites-available/myapp
#   3. Replace "yourdomain.com" with your actual domain
#   4. Get SSL certs: sudo certbot --nginx -d yourdomain.com
#   5. Symlink: ln -s /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/
#   6. Test: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # --- API requests → Flask backend ---
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket support (uncomment if you add WebSockets) ---
    # location /socket.io/ {
    #     proxy_pass http://127.0.0.1:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }

    # --- Frontend (SPA fallback) ---
    # Serve built static files. For production, run `npm run build` and
    # point this to the dist/ directory.
    location / {
        root /opt/myapp/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # --- Static asset caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /opt/myapp/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
